<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Пиксельный офис v6</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0f9ff; font-family: monospace; }
    * { box-sizing: border-box; }
    #boot-error {
      display: none;
      padding: 16px; margin: 16px;
      background: #fee2e2; border: 3px solid #991b1b;
      color: #991b1b; font-family: monospace; font-size: 13px;
      white-space: pre-wrap; word-break: break-word;
      line-height: 1.4;
      box-shadow: 4px 4px 0 #1c1917;
    }
    #boot-error h3 { margin: 0 0 8px; font-size: 16px; }
    #boot-version {
      position: fixed; top: 4px; right: 6px;
      background: #fde68a; padding: 2px 8px;
      font-size: 11px; color: #92400e; z-index: 9999;
      border: 1px solid #92400e;
    }
  </style>
</head>
<body>
  <div id="boot-version">V6</div>
  <div id="root">
    <div style="padding:40px;text-align:center;color:#0c4a6e;">Загрузка...</div>
  </div>
  <div id="boot-error"></div>

  <script>
  // Перехватываем все ошибки и показываем их на странице
  function showBootError(label, err) {
    var box = document.getElementById('boot-error');
    if (!box) return;
    var msg = '';
    if (err) {
      if (err.message) msg = err.message;
      else if (typeof err === 'string') msg = err;
      else msg = JSON.stringify(err);
      if (err.stack) msg += '\n\n' + err.stack;
    }
    box.style.display = 'block';
    box.innerHTML = '<h3>⚠ ' + label + '</h3>' + (msg || '(нет деталей)');
  }
  window.addEventListener('error', function(e) {
    showBootError('Ошибка: ' + (e.message || 'неизвестно'), e.error);
  });
  window.addEventListener('unhandledrejection', function(e) {
    showBootError('Promise упал', e.reason);
  });
  </script>
