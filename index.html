const TILE_W = 32;       // ширина диаманта (плитки)
const TILE_H = 16;       // высота диаманта (2:1 — стандарт изо)
const COLS = 9;

// Проекция точки (col, row) в экранные координаты
function toScreen(col, row) {
return {
x: (col - row) * TILE_W / 2 + ORIGIN_X,
y: (col + row) * TILE_H / 2 + ORIGIN_Y,
};
}
// Центр клетки (col, row)
function tileCenter(col, row) {
return toScreen(col + 0.5, row + 0.5);
}

// ============ ИЗОМЕТРИЧЕСКИЙ МИР ============

function IsoWorld() {
// Пол — диамантовая сетка
const tiles = [];
for (let row = 0; row < ROWS; row++) {
for (let col = 0; col < COLS; col++) {
const c = tileCenter(col, row);
const isDark = (col + row) % 2 === 0;
const points = `${c.x},${c.y - TILE_H/2} ${c.x + TILE_W/2},${c.y} ${c.x},${c.y + TILE_H/2} ${c.x - TILE_W/2},${c.y}`;
tiles.push(
<polygon key={`t${col},${row}`} points={points}
fill={isDark ? ‘#fde68a’ : ‘#fef3c7’}
stroke=”#d97706” strokeWidth=“0.4” opacity={0.95} />
);
}
}

// Углы стен

function IsoDesk({ col, row, zIndex }) {

const halfH = 6;

const tE = { x: c.x + halfW, y: c.y - dh };
const tS = { x: c.x, y: c.y + halfH - dh };
const tW = { x: c.x - halfW, y: c.y - dh };
// Углы footprint (на полу)
const fE = { x: c.x + halfW, y: c.y };

// Доска объявлений на задней правой стене (с наклоном по поверхности стены)
function IsoTaskBoard({ count }) {
// Доска “висит” между col=1.5 и col=7.5, на высоте z=12..44
const boardLeftCol = 1.5;
const boardRightCol = 7.5;
const boardZBottom = 12;
const boardZTop = 44;

const boardW = (boardRightCol - boardLeftCol) * TILE_W / 2; // 96
const boardH = boardZTop - boardZBottom; // 32

// Верхний-левый угол доски в экранных координатах
const tl = toScreen(boardLeftCol, 0);
const boardX = tl.x;
const boardY = tl.y - boardZTop;

// Угол наклона стены: atan(TILE_H/TILE_W)
const skewDeg = (Math.atan(TILE_H / TILE_W) * 180) / Math.PI; // ≈ 26.565

return (
<svg style={{
position: ‘absolute’, left: 0, top: 0,
width: WORLD_W, height: WORLD_H,
pointerEvents: ‘none’, zIndex: 1,
overflow: ‘visible’,
}}>

<g transform={`translate(${boardX}, ${boardY}) skewY(${skewDeg})`}>

const MODEL_ID = ‘claude-haiku-4-5-20251001’;

const ROLE_PROMPTS = {
Dev: ‘Ты опытный разработчик. Реши задачу: дай код, разбор или совет. Отвечай ёмко на русском (3-6 предложений или короткий блок кода).’,
Designer: ‘Ты UI/UX дизайнер. Опиши решение: визуал, структура, UX-ход. Ёмко, на русском.’,
Manager: ‘Ты проджект-менеджер. Разбей задачу на шаги, отметь приоритеты и риски. Ёмко, на русском.’,
Gamedev: ‘Ты гейм-разработчик. Реши задачу с упором на механику, движок, баланс. Ёмко, на русском.’,
QA: ‘Ты QA-инженер. Опиши тест-кейсы или вероятные баги для задачи. Ёмко, на русском.’,
};

async function callClaude(apiKey, role, taskTitle) {
const res = await fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: {
‘Content-Type’: ‘application/json’,
‘x-api-key’: apiKey,
‘anthropic-version’: ‘2023-06-01’,
‘anthropic-dangerous-direct-browser-access’: ‘true’,
},
body: JSON.stringify({
model: MODEL_ID,
max_tokens: 512,
system: ROLE_PROMPTS[role] || ROLE_PROMPTS.Dev,
messages: [{ role: ‘user’, content: taskTitle }],
}),
});
if (!res.ok) {
const text = await res.text();
throw new Error(’HTTP ’ + res.status + ’: ’ + text.slice(0, 200));
}
const data = await res.json();
return data.content?.[0]?.text || ‘(пустой ответ)’;
}
